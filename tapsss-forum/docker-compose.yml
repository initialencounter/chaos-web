services:
  forum:
    volumes:
      - ./dist:/root/forum/dist
      - ./image-cache:/root/forum/image-cache
      - ./record-cache:/root/forum/record-cache
      - ./app:/root/forum/app
    ports:
      - 3001:3001
    container_name: forum
    image: ubuntu
    restart: always
    command: bash -c "cd /root/forum && ./app" # tail -f /dev/null
